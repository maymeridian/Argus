services:
  olmocr:
    build: .
    image: argus-olmocr
    volumes:
      # Mount your Windows folder to /data inside the container
      - ./images:/data
      # Mount output folder to persist OCR results
      - ./output:/tmp/olmocr_output
      # Persist Hugging Face cache to avoid redownloading models
      - ./huggingface_cache:/root/.cache/huggingface
      # Mount code files so changes are reflected immediately without rebuilding
      - ./main.py:/app/main.py
      - ./handler:/app/handler
      # Mount application folder for Streamlit imports
      - ./application:/app/application
    # Enable GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
