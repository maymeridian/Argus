services:
  olmocr:
    build: .
    volumes:
      # Mount your Windows folder to /data inside the container
      - ./images:/data
      # Mount output folder to persist OCR results
      - ./output:/tmp/olmocr_output
    # Enable GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
